# Dev environment overrides for dashboard-admin service
image:
  repository: multipllacrdev1.azurecr.io/dashboard-admin
  pullPolicy: IfNotPresent

ingress:
  subdomain:
    branchName: "main"
    state: "stable"
    baseDomain: "dev-internal-api.multipll.com"

deployment:
  replicas: 1

env:
  NODE_ENV: "development"

envConfig:
  AUTH_API_URL: "https://auth-main-stable.dev-internal-api.multipll.com"
  API_BASE_URL: "https://auth-main-stable.dev-internal-api.multipll.com"
  ENTRA_CALLBACK_REDIRECT_URI: "https://auth-main-stable.dev-internal-api.multipll.com/callback"
  COA_API_URL: "https://coa-main-stable.dev-internal-api.multipll.com"

keyvault:
  name: "multipll-keyvault-dev"
