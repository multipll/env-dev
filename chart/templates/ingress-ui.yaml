{{- if .Values.global.routing.ui.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ui
  labels:
    {{- include "multipll.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- with .Values.global.routing.ui.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ include "multipll.uiDomain" . }}
      secretName: {{ .Values.global.routing.tlsSecretName }}
  rules:
    - host: {{ include "multipll.uiDomain" . }}
      http:
        paths:
          # ── dashboard-admin: /admin/* ──────────────────────────────────
          {{- if index .Values "dashboard-admin" "enabled" }}
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-dashboard-admin
                port:
                  number: 3000
          {{- end }}
          # ── dashboard-cfo: /cfo/* ─────────────────────────────────────
          {{- if index .Values "dashboard-cfo" "enabled" }}
          - path: /cfo
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-dashboard-cfo
                port:
                  number: 3000
          {{- end }}
{{- end }}
